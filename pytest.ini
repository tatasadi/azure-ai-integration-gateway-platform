[pytest]
# Pytest configuration for Azure AI Integration Gateway

# Register custom markers
markers =
    slow: marks tests as slow (rate limiting, load tests) (deselect with '-m "not slow"')
    integration: marks tests that require deployed Azure resources
    smoke: marks tests for quick smoke testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    --tb=short
    --strict-markers

# Warnings
filterwarnings =
    ignore::DeprecationWarning
