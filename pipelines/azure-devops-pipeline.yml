                    filePath: '$(System.DefaultWorkingDirectory)/scripts/smoke-test.sh'
                    arguments: '$(APIM_GATEWAY_URL)'
                    workingDirectory: '$(System.DefaultWorkingDirectory)'
                  continueOnError: false  # Fail staging deployment if tests fail

                - script: |
                    echo "Running additional integration tests..."
                    cd tests/integration
                    # Uncomment when integration tests are implemented
                    # python -m pytest test_ai_gateway.py -v
                    echo "Integration tests completed"
                  displayName: 'Run Python Integration Tests'
                  continueOnError: true

  # ============================================
  # Stage 6: Plan (Production)
