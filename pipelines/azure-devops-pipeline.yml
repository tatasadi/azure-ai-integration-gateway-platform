name: AI-Gateway-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - terraform/**
      - apim-policies/**
      - pipelines/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**
      - apim-policies/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: ai-gateway-common
  - name: terraformVersion
    value: '1.5.0'
  - name: workingDirectory
    value: '$(System.DefaultWorkingDirectory)/terraform'
  - name: azureServiceConnection
    value: 'Azure-ServiceConnection'

stages:
  # ============================================
  # Stage 1: Validate
  # ============================================
  - stage: Validate
    displayName: 'Validate Configuration'
    jobs:
      - job: ValidateTerraform
        displayName: 'Validate Terraform'
        steps:
          - task: TerraformInstaller@0
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV2@2
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(azureServiceConnection)
              commandOptions: '-backend=false'

          - task: TerraformTaskV2@2
            displayName: 'Terraform Validate'
            inputs:
              provider: 'azurerm'
              command: 'validate'
              workingDirectory: $(workingDirectory)

          - task: TerraformTaskV2@2
            displayName: 'Terraform Format Check'
            inputs:
              provider: 'azurerm'
              command: 'custom'
              customCommand: 'fmt'
              commandOptions: '-check -recursive'
              workingDirectory: $(workingDirectory)
            continueOnError: true

      - job: ValidatePolicies
        displayName: 'Validate APIM Policies'
        steps:
          - script: |
              echo "Validating APIM policy XML files..."
              FAILED=0

              # Validate each XML file and track failures
              while IFS= read -r -d '' file; do
                echo "Validating: $file"
                if ! xmllint --noout "$file" 2>&1; then
                  echo "##vso[task.logissue type=error]Invalid XML in: $file"
                  FAILED=1
                fi
              done < <(find apim-policies -name "*.xml" -print0)

              if [ $FAILED -eq 0 ]; then
                echo "All policy files are valid XML"
              else
                echo "##vso[task.logissue type=error]XML validation failed"
                exit 1
              fi
            displayName: 'Validate XML Policies'

      - job: SecurityScan
        displayName: 'Security Scanning'
        steps:
          - script: |
              echo "Running security scan with Checkov..."
              pip install checkov
              # CKV_AZURE_109: Ensure that key vault allows firewall rules settings (conflicts with internal-only access pattern)
              # CKV_AZURE_110: Ensure that key vault enables purge protection (may conflict with dev/test environments)
              checkov -d terraform/ --skip-check CKV_AZURE_109,CKV_AZURE_110 --compact --quiet
            displayName: 'Run Checkov Security Scan'
            continueOnError: true

  # ============================================
  # Stage 2: Plan (Dev)
  # ============================================
  - stage: PlanDev
    displayName: 'Plan - Dev'
    dependsOn: Validate
    condition: succeeded()
    variables:
      - group: ai-gateway-dev
    jobs:
      - job: TerraformPlan
        displayName: 'Terraform Plan Dev'
        steps:
          - task: TerraformInstaller@0
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV2@2
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: 'rg-terraform'
              backendAzureRmStorageAccountName: 'sttfstateta'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'azure-ai-integration-dev.tfstate'

          - task: TerraformTaskV2@2
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              commandOptions: '-var="project_name=$(PROJECT_NAME)" -var="environment=$(ENVIRONMENT)" -var="location=$(LOCATION)" -var="apim_publisher_name=$(APIM_PUBLISHER_NAME)" -var="apim_publisher_email=$(APIM_PUBLISHER_EMAIL)" -var="apim_sku_name=$(APIM_SKU_NAME)" -var="enable_gpt4o=$(ENABLE_GPT4O)" -var="enable_gpt35_turbo=$(ENABLE_GPT35_TURBO)" -out=tfplan-dev'
              workingDirectory: $(workingDirectory)
              environmentServiceNameAzureRM: $(azureServiceConnection)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Plan Artifact'
            inputs:
              targetPath: '$(workingDirectory)/tfplan-dev'
              artifact: 'tfplan-dev'
              publishLocation: 'pipeline'

          - task: Cache@2
            displayName: 'Cache Infracost'
            inputs:
              key: 'infracost | "$(Agent.OS)"'
              path: $(Pipeline.Workspace)/.infracost
              cacheHitVar: INFRACOST_CACHE_RESTORED

          - script: |
              # Install Infracost if not cached
              if [ "$(INFRACOST_CACHE_RESTORED)" != "true" ]; then
                echo "Installing Infracost..."
                curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
                mkdir -p $(Pipeline.Workspace)/.infracost
                cp /usr/local/bin/infracost $(Pipeline.Workspace)/.infracost/ || cp ~/.local/bin/infracost $(Pipeline.Workspace)/.infracost/ || true
              else
                echo "Using cached Infracost"
                sudo cp $(Pipeline.Workspace)/.infracost/infracost /usr/local/bin/ || cp $(Pipeline.Workspace)/.infracost/infracost ~/.local/bin/
              fi

              # Generate cost estimate with Terraform variables
              cd $(workingDirectory)
              infracost breakdown --path . \
                --terraform-var="project_name=$(PROJECT_NAME)" \
                --terraform-var="environment=$(ENVIRONMENT)" \
                --terraform-var="location=$(LOCATION)" \
                --terraform-var="apim_publisher_name=$(APIM_PUBLISHER_NAME)" \
                --terraform-var="apim_publisher_email=$(APIM_PUBLISHER_EMAIL)" \
                --terraform-var="apim_sku_name=$(APIM_SKU_NAME)" \
                --terraform-var="enable_gpt4o=$(ENABLE_GPT4O)" \
                --terraform-var="enable_gpt35_turbo=$(ENABLE_GPT35_TURBO)" \
                --format json \
                --out-file $(Build.ArtifactStagingDirectory)/infracost-dev.json || true

              # Display cost estimate
              infracost output --path $(Build.ArtifactStagingDirectory)/infracost-dev.json \
                --format table || true
            displayName: 'Cost Estimation with Infracost'
            env:
              INFRACOST_API_KEY: $(INFRACOST_API_KEY)
            continueOnError: true

  # ============================================
  # Stage 3: Deploy (Dev)
  # ============================================
  - stage: DeployDev
    displayName: 'Deploy - Dev'
    dependsOn: PlanDev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - group: ai-gateway-dev
    jobs:
      - deployment: DeployInfrastructure
        displayName: 'Deploy Infrastructure'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@0
                  displayName: 'Install Terraform'
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Plan Artifact'
                  inputs:
                    artifactName: 'tfplan-dev'
                    targetPath: '$(System.DefaultWorkingDirectory)/terraform'

                - task: TerraformTaskV2@2
                  displayName: 'Terraform Init'
                  inputs:
                    provider: 'azurerm'
                    command: 'init'
                    workingDirectory: $(workingDirectory)
                    backendServiceArm: $(azureServiceConnection)
                    backendAzureRmResourceGroupName: 'rg-terraform'
                    backendAzureRmStorageAccountName: 'sttfstateta'
                    backendAzureRmContainerName: 'tfstate'
                    backendAzureRmKey: 'azure-ai-integration-dev.tfstate'

                - task: TerraformTaskV2@2
                  displayName: 'Terraform Apply'
                  inputs:
                    provider: 'azurerm'
                    command: 'apply'
                    commandOptions: 'tfplan-dev'
                    workingDirectory: $(workingDirectory)
                    environmentServiceNameAzureRM: $(azureServiceConnection)

                - task: Bash@3
                  displayName: 'Extract Terraform Outputs'
                  inputs:
                    targetType: 'inline'
                    script: |
                      cd $(workingDirectory)

                      # Extract outputs from Terraform
                      APIM_URL=$(terraform output -raw apim_gateway_url)

                      # Set pipeline variables for subsequent steps
                      echo "##vso[task.setvariable variable=APIM_GATEWAY_URL]$APIM_URL"

                      echo "APIM Gateway URL: $APIM_URL"
                      echo "Note: Subscription key must be obtained from Azure Portal > APIM > Subscriptions"

                - task: Bash@3
                  displayName: 'Run Smoke Tests'
                  inputs:
                    targetType: 'filePath'
                    filePath: '$(System.DefaultWorkingDirectory)/scripts/smoke-test.sh'
                    arguments: '$(APIM_GATEWAY_URL)'
                    workingDirectory: '$(System.DefaultWorkingDirectory)'
                  continueOnError: true

  # ============================================
  # Stage 4: Plan (Staging)
  # ============================================
  - stage: PlanStaging
    displayName: 'Plan - Staging'
    dependsOn: DeployDev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - group: ai-gateway-staging
    jobs:
      - job: TerraformPlan
        displayName: 'Terraform Plan Staging'
        steps:
          - task: TerraformInstaller@0
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV2@2
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: $(workingDirectory)
              backendServiceArm: $(azureServiceConnection)
              backendAzureRmResourceGroupName: 'rg-terraform'
              backendAzureRmStorageAccountName: 'sttfstateta'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'azure-ai-integration-staging.tfstate'

          - task: TerraformTaskV2@2
            displayName: 'Terraform Plan'
