name: AI-Gateway-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - terraform/**
      - apim-policies/**
      - pipelines/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - terraform/**
      - apim-policies/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: ai-gateway-common
  - name: terraformVersion
    value: '1.7.5'
  - name: workingDirectory
    value: '$(System.DefaultWorkingDirectory)/terraform'
  - name: azureServiceConnection
    value: 'Azure-ServiceConnection'
  - name: backendResourceGroup
    value: 'rg-terraform'
  - name: backendStorageAccount
    value: 'sttfstateta'
  - name: backendContainer
    value: 'tfstate'

stages:
  # ============================================
  # Stage 1: Validate
  # ============================================
  - stage: Validate
    displayName: 'Validate Configuration'
    jobs:
      - job: ValidateTerraform
        displayName: 'Validate Terraform'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AzureCLI@2
            displayName: 'Terraform Init'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail
                cd $(workingDirectory)

                # Configure Terraform to use OIDC/Workload Identity Federation
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="$idToken"

                terraform init -backend=false
              workingDirectory: $(workingDirectory)
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

          - task: Bash@3
            displayName: 'Terraform Validate'
            inputs:
              targetType: 'inline'
              script: |
                cd $(workingDirectory)
                terraform validate
              workingDirectory: $(workingDirectory)

          - task: Bash@3
            displayName: 'Terraform Format Check'
            inputs:
              targetType: 'inline'
              script: |
                cd $(workingDirectory)
                terraform fmt -check -recursive
                if [ $? -ne 0 ]; then
                  echo "##[error]Terraform files are not properly formatted. Run 'terraform fmt -recursive' locally."
                  exit 1
                fi
              workingDirectory: $(workingDirectory)
            continueOnError: true

      - job: ValidatePolicies
        displayName: 'Validate APIM Policies'
        steps:
          - script: |
              sudo apt-get update -qq
              sudo apt-get install -y libxml2-utils
            displayName: 'Install xmllint'

          - script: |
              echo "Validating APIM policy XML files..."
              FAILED=0

              # Validate each XML file and track failures
              while IFS= read -r -d '' file; do
                echo "Validating: $file"
                if ! xmllint --noout "$file" 2>&1; then
                  echo "##vso[task.logissue type=error]Invalid XML in: $file"
                  FAILED=1
                fi
              done < <(find apim-policies -name "*.xml" -print0)

              if [ $FAILED -eq 0 ]; then
                echo "All policy files are valid XML"
              else
                echo "##vso[task.logissue type=error]XML validation failed"
                exit 1
              fi
            displayName: 'Validate XML Policies'

      - job: SecurityScan
        displayName: 'Security Scanning'
        steps:
          - script: |
              echo "Running security scan with Checkov..."
              pip install checkov
              # CKV_AZURE_107: APIM VNet integration requires Premium SKU (cost consideration)
              # CKV_AZURE_134: Cognitive Services public access needed for APIM connectivity (no VNet)
              # CKV_AZURE_174: APIM public access needed for external clients (by design)
              # CKV_AZURE_189: Key Vault public access needed (no private endpoint infrastructure)
              # CKV_AZURE_247: Cognitive Services DLP requires additional configuration
              # CKV2_AZURE_22: Customer-managed keys require Key Vault integration (future enhancement)
              # CKV2_AZURE_32: Private endpoints require VNet infrastructure (future enhancement)
              checkov -d terraform/ --skip-check CKV_AZURE_107,CKV_AZURE_134,CKV_AZURE_174,CKV_AZURE_189,CKV_AZURE_247,CKV2_AZURE_22,CKV2_AZURE_32 --compact --quiet
            displayName: 'Run Checkov Security Scan'
            continueOnError: true

  # ============================================
  # Stage 2: Plan (Dev)
  # ============================================
  - stage: PlanDev
    displayName: 'Plan - Dev'
    dependsOn: Validate
    condition: succeeded()
    variables:
      - group: ai-gateway-dev
      - name: backendKey
        value: 'azure-ai-integration-dev.tfstate'
    jobs:
      - job: TerraformPlan
        displayName: 'Terraform Plan Dev'
        steps:
          - task: TerraformInstaller@1
            displayName: 'Install Terraform'
            inputs:
              terraformVersion: $(terraformVersion)

          - task: AzureCLI@2
            displayName: 'Terraform Init'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail
                cd $(workingDirectory)

                # Configure Terraform to use OIDC/Workload Identity Federation
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="$idToken"

                terraform init \
                  -backend-config="resource_group_name=$(backendResourceGroup)" \
                  -backend-config="storage_account_name=$(backendStorageAccount)" \
                  -backend-config="container_name=$(backendContainer)" \
                  -backend-config="key=$(backendKey)"
              workingDirectory: $(workingDirectory)
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

          - task: AzureCLI@2
            displayName: 'Terraform Plan'
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              addSpnToEnvironment: true
              inlineScript: |
                set -euo pipefail
                cd $(workingDirectory)

                # Configure Terraform to use OIDC/Workload Identity Federation
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                export ARM_USE_OIDC=true
                export ARM_OIDC_TOKEN="$idToken"

                terraform plan \
                  -var="project_name=$(PROJECT_NAME)" \
                  -var="environment=$(ENVIRONMENT)" \
                  -var="location=$(LOCATION)" \
                  -var="apim_publisher_name=$(APIM_PUBLISHER_NAME)" \
                  -var="apim_publisher_email=$(APIM_PUBLISHER_EMAIL)" \
                  -var="apim_sku_name=$(APIM_SKU_NAME)" \
                  -var="enable_gpt4o=$(ENABLE_GPT4O)" \
                  -var="enable_gpt35_turbo=$(ENABLE_GPT35_TURBO)" \
                  -out=tfplan-dev
              workingDirectory: $(workingDirectory)
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Plan Artifact'
            inputs:
              targetPath: '$(workingDirectory)/tfplan-dev'
              artifact: 'tfplan-dev'
              publishLocation: 'pipeline'

          - task: Cache@2
            displayName: 'Cache Infracost'
            inputs:
              key: 'infracost | "$(Agent.OS)"'
              path: $(Pipeline.Workspace)/.infracost
              cacheHitVar: INFRACOST_CACHE_RESTORED

          - script: |
              # Install Infracost if not cached
              if [ "$(INFRACOST_CACHE_RESTORED)" != "true" ]; then
                echo "Installing Infracost..."
                curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
                mkdir -p $(Pipeline.Workspace)/.infracost
                cp /usr/local/bin/infracost $(Pipeline.Workspace)/.infracost/ || cp ~/.local/bin/infracost $(Pipeline.Workspace)/.infracost/ || true
              else
                echo "Using cached Infracost"
                sudo cp $(Pipeline.Workspace)/.infracost/infracost /usr/local/bin/ || cp $(Pipeline.Workspace)/.infracost/infracost ~/.local/bin/
              fi

              # Generate cost estimate with Terraform variables
              cd $(workingDirectory)
              infracost breakdown --path . \
                --terraform-var="project_name=$(PROJECT_NAME)" \
                --terraform-var="environment=$(ENVIRONMENT)" \
                --terraform-var="location=$(LOCATION)" \
                --terraform-var="apim_publisher_name=$(APIM_PUBLISHER_NAME)" \
                --terraform-var="apim_publisher_email=$(APIM_PUBLISHER_EMAIL)" \
                --terraform-var="apim_sku_name=$(APIM_SKU_NAME)" \
                --terraform-var="enable_gpt4o=$(ENABLE_GPT4O)" \
                --terraform-var="enable_gpt35_turbo=$(ENABLE_GPT35_TURBO)" \
                --format json \
                --out-file $(Build.ArtifactStagingDirectory)/infracost-dev.json || true

              # Display cost estimate
              infracost output --path $(Build.ArtifactStagingDirectory)/infracost-dev.json \
                --format table || true
            displayName: 'Cost Estimation with Infracost'
            env:
              INFRACOST_API_KEY: $(INFRACOST_API_KEY)
            continueOnError: true

  # ============================================
  # Stage 3: Deploy (Dev)
  # ============================================
  - stage: DeployDev
    displayName: 'Deploy - Dev'
    dependsOn: PlanDev
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    variables:
      - group: ai-gateway-dev
      - name: backendKey
        value: 'azure-ai-integration-dev.tfstate'
    jobs:
      - deployment: DeployInfrastructure
        displayName: 'Deploy Infrastructure'
        environment: 'dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: 'Install Terraform'
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Plan Artifact'
                  inputs:
                    artifactName: 'tfplan-dev'
                    targetPath: '$(System.DefaultWorkingDirectory)/terraform'

                - task: AzureCLI@2
                  displayName: 'Terraform Init'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      set -euo pipefail
                      cd $(workingDirectory)

                      # Configure Terraform to use OIDC/Workload Identity Federation
                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="$idToken"

                      terraform init \
                        -backend-config="resource_group_name=$(backendResourceGroup)" \
                        -backend-config="storage_account_name=$(backendStorageAccount)" \
                        -backend-config="container_name=$(backendContainer)" \
                        -backend-config="key=$(backendKey)"
                    workingDirectory: $(workingDirectory)
                  env:
                    ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

                - task: AzureCLI@2
                  displayName: 'Terraform Apply'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    addSpnToEnvironment: true
                    inlineScript: |
                      set -euo pipefail
                      cd $(workingDirectory)

                      # Configure Terraform to use OIDC/Workload Identity Federation
                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID="$(az account show --query id -o tsv)"
                      export ARM_USE_OIDC=true
                      export ARM_OIDC_TOKEN="$idToken"

                      terraform apply -auto-approve tfplan-dev
                    workingDirectory: $(workingDirectory)
                  env:
                    ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

                - task: Bash@3
                  displayName: 'Extract Terraform Outputs'
                  inputs:
                    targetType: 'inline'
                    script: |
                      cd $(workingDirectory)

                      # Extract outputs from Terraform
                      APIM_URL=$(terraform output -raw apim_gateway_url)

                      # Set pipeline variables for subsequent steps
                      echo "##vso[task.setvariable variable=APIM_GATEWAY_URL]$APIM_URL"

                      echo "APIM Gateway URL: $APIM_URL"
                      echo "Note: Subscription key must be obtained from Azure Portal > APIM > Subscriptions"

                - task: Bash@3
                  displayName: 'Run Smoke Tests'
                  inputs:
                    targetType: 'filePath'
                    filePath: '$(System.DefaultWorkingDirectory)/scripts/smoke-test.sh'
                    arguments: '$(APIM_GATEWAY_URL)'
                    workingDirectory: '$(System.DefaultWorkingDirectory)'
                  continueOnError: true

