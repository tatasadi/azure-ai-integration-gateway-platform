  - name: Getting Started
    url: https://docs.ai-gateway.example.com/getting-started
  - name: Authentication Guide
    url: https://docs.ai-gateway.example.com/authentication
  - name: Rate Limits
    url: https://docs.ai-gateway.example.com/rate-limits
  - name: Best Practices
    url: https://docs.ai-gateway.example.com/best-practices
